<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glitchgrab</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="logo">Glitchgrab</span>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="conn" id="conn" title="Server connection">⚫</span>
        <span class="badge" id="badge">idle</span>
      </div>
    </div>

    <!-- idle state -->
    <div class="panel" id="panel-idle">
      <div class="status">
        Press Record in <strong>GlitchRecord</strong> to start capturing. This panel is just a status indicator.
      </div>
    </div>

    <!-- recording state -->
    <div class="panel" id="panel-recording" style="display:none">
      <div class="status recording-status">
        <span class="dot"></span> Capturing clicks for GlitchRecord.
      </div>
      <div class="count" id="count">0 events</div>
    </div>

    <!-- done state -->
    <div class="panel" id="panel-done" style="display:none">
      <div class="status">Capture complete — events sent to GlitchRecord.</div>
      <div class="count" id="count-done"></div>
    </div>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
