<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glitchgrab</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="logo">Glitchgrab</span>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="conn" id="conn" title="Server connection">⚫</span>
        <span class="badge" id="badge">idle</span>
      </div>
    </div>

    <!-- idle state -->
    <div class="panel" id="panel-idle">
      <div class="status">
        Toggle <strong>Start Capture</strong> in Recordly extension, or press <kbd>Ctrl+Shift+G</kbd> manually.
      </div>
      <button class="btn btn-start" id="btn-start">Start Capture</button>
    </div>

    <!-- recording state -->
    <div class="panel" id="panel-recording" style="display:none">
      <div class="status recording-status">
        <span class="dot"></span> Capturing — click around normally in Chrome.
      </div>
      <div class="count" id="count">0 events</div>
      <button class="btn btn-stop" id="btn-stop">Stop Capture</button>
    </div>

    <!-- done state: session uploaded -->
    <div class="panel" id="panel-done" style="display:none">
      <div class="result-label">Session ID — give this to Claude with <kbd>/glitchgrab-script</kbd></div>
      <div class="session-id" id="session-id"></div>
      <div class="row">
        <button class="btn btn-primary" id="btn-copy-id">Copy Session ID</button>
      </div>
      <div class="count" id="count-done"></div>
      <button class="btn btn-ghost" id="btn-new-from-done">+ New Capture</button>
    </div>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
