name: Release SDK

on:
  push:
    branches: [main]
    paths:
      - "packages/sdk-nextjs/**"

  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  issues: write
  id-token: write

jobs:
  release:
    runs-on: self-hosted

    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
          persist-credentials: true

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Build SDK
        run: bun run build
        working-directory: packages/sdk-nextjs

      - name: Verify build output
        run: |
          ls -la dist/
          test -f dist/index.js
          test -f dist/index.mjs
          test -f dist/index.d.ts
        working-directory: packages/sdk-nextjs

      - name: Prepare for npm publish
        run: |
          rm -f ../../bun.lock
          rm -f ../../package.json
        working-directory: packages/sdk-nextjs

      - name: Release
        run: npx semantic-release
        working-directory: packages/sdk-nextjs
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Self-heal: semantic-release pushes the git tag BEFORE npm publish, so a failed
      # publish leaves package.json/tag bumped while npm stays behind, and every later
      # run no-ops ("0 commits since last release"). This republishes whenever the exact
      # local version is missing from npm, recovering that stuck state automatically.
      - name: Reconcile npm registry
        working-directory: packages/sdk-nextjs
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          ON_NPM=false
          for i in 1 2 3 4 5; do
            if npm view "glitchgrab@${LOCAL}" version >/dev/null 2>&1; then
              ON_NPM=true
              break
            fi
            echo "glitchgrab@${LOCAL} not visible on npm yet (attempt ${i}/5) — registry may still be propagating, retrying..."
            sleep 5
          done

          if [ "$ON_NPM" = true ]; then
            echo "glitchgrab@${LOCAL} already on npm — in sync"
          else
            echo "glitchgrab@${LOCAL} still missing from npm — publishing to catch up"
            if ! npm publish --tag latest 2>publish.log; then
              if grep -q "cannot publish over the previously published versions" publish.log; then
                echo "npm reports ${LOCAL} already published (registry just hadn't caught up on 'npm view') — treating as in sync"
                cat publish.log
              else
                cat publish.log
                exit 1
              fi
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
